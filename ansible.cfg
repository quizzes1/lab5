[defaults]
# Используем fallback-скрипт как основной инвентарь (коллекция yandex.cloud
# недоступна — её больше нет ни в Galaxy, ни на GitHub).
inventory            = ./inventory/yc_fallback.py
roles_path           = ./roles
host_key_checking    = False
remote_user          = yc-user
private_key_file     = ~/.ssh/lab5_key
stdout_callback      = yaml
forks                = 10
gathering            = smart
retry_files_enabled  = False
interpreter_python   = auto_silent

[inventory]
enable_plugins = script, host_list, auto, yaml, ini, toml

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR
