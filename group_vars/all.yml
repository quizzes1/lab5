---
# Yandex Cloud — общие переменные проекта.
# ВАЖНО: подставить реальные folder_id и subnet_id после `yc init`.

yc:
  folder_id: "REPLACE_WITH_FOLDER_ID"   # yc config get folder-id
  zone: "ru-central1-a"
  subnet_id: "REPLACE_WITH_SUBNET_ID"   # yc vpc subnet list

image:
  family: "ubuntu-2204-lts"
  folder_id: "standard-images"

vm_defaults:
  platform_id: "standard-v3"
  cores: 2
  memory_gb: 2
  disk_size_gb: 20
  ssh_user: "ubuntu"

# Публичный SSH-ключ для доступа к создаваемым ВМ.
# Лучше переопределить через --extra-vars или vault.
ssh_pub_key: "{{ lookup('file', '~/.ssh/lab5_key.pub') }}"

# Список web-ВМ, которые создаст provision.yml и удалит teardown.yml.
web_hosts:
  - name: "web-1"
    labels:
      role: "web"
      lab: "lab5"
  - name: "web-2"
    labels:
      role: "web"
      lab: "lab5"
